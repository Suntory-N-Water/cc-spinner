name: Validate Themes

on:
  pull_request:
    paths:
      - "themes/**"

defaults:
  run:
    shell: bash

permissions: {}

jobs:
  validate:
    name: validate
    timeout-minutes: 5
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
      - run: bun run src/validate-themes.ts
